name: Build and Deploy Flutter Web
on:
  push:
    branches:
      - main

# This gives the cloud server permission to publish the live website
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # This is the new magic step: It auto-generates the missing web folder
      - name: Generate Web Folders
        run: flutter create . --platforms web

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web App
        run: flutter build web --base-href "/Wazee-cricket/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web